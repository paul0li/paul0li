<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  html,body{margin:0;padding:0;background:#ff00ff;}
  #banner{position:absolute;top:0;left:0;width:880px;height:300px;background:#ffffff;overflow:hidden;
    font-family:'Jost',system-ui,sans-serif;color:#1a1a1a;}
  .pad{position:relative;padding:56px;height:100%;box-sizing:border-box;}
  .sq{position:absolute;top:48px;left:46px;width:96px;height:96px;background:#d62828;z-index:0;}
  .stack{position:relative;z-index:1;}
  .name{font-weight:800;font-size:104px;line-height:0.9;letter-spacing:-0.03em;}
  .role{font-family:'Space Mono',monospace;font-weight:400;font-size:15px;letter-spacing:0.12em;margin-top:16px;}
  .shapes{position:absolute;top:54px;right:56px;display:flex;gap:16px;align-items:center;}
  .tri{width:0;height:0;border-left:21px solid transparent;border-right:21px solid transparent;border-bottom:37px solid #1d3557;}
  .cir{width:42px;height:42px;border-radius:50%;background:#f4a300;}
</style>
</head>
<body>
<div id="banner">
  <div class="pad">
    <div class="sq"></div>
    <div class="stack">
      <div class="name">paul0li</div>
      <div class="role">SOLUTIONS ARCHITECT&nbsp;&nbsp;·&nbsp;&nbsp;DATA &amp; AI INFRASTRUCTURE</div>
    </div>
    <div class="shapes">
      <div class="tri"></div>
      <div class="cir"></div>
    </div>
  </div>
</div>
</body>
</html>
